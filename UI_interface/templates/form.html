<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Credit Risk Prediction</title>

    <!-- Bootstrap CSS CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #f8f9fa;
        font-family: Arial, sans-serif;
      }
      .container {
        max-width: 700px;
        margin-top: 50px;
      }
      .card {
        border-radius: 15px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        padding: 30px;
        background-color: white;
      }
      label {
        font-weight: 600;
      }
      .result-box {
        margin-top: 20px;
        padding: 15px;
        border-radius: 10px;
        font-weight: bold;
        background-color: #e9f7ef;
        border: 1px solid #a3d9a5;
        text-align: center;
      }
    </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h2 class="text-center mb-4">Credit Risk Prediction</h2>
      <form method="post">
        <div class="mb-3">
          <label for="term" class="form-label">Term</label>
          <select class="form-select" id="term" name="term" required>
            <option value="36 months">36 months</option>
            <option value="60 months">60 months</option>
          </select>
        </div>

        <div class="mb-3">
          <label for="int_rate" class="form-label">Interest Rate (%)</label>
          <input
            type="number"
            step="0.01"
            id="int_rate"
            name="int_rate"
            class="form-control"
            required
          />
        </div>

        <div class="mb-3">
          <label for="grade" class="form-label">Grade</label>
          <select class="form-select" id="grade" name="grade" required>
            <option>A</option><option>B</option><option>C</option><option>D</option><option>E</option><option>F</option><option>G</option>
          </select>
        </div>

        <div class="mb-3">
          <label for="emp_length" class="form-label">Employment Length</label>
          <select class="form-select" id="emp_length" name="emp_length" required>
            <option>< 1 year</option>
            <option>1 year</option>
            <option>2 years</option>
            <option>3 years</option>
            <option>4 years</option>
            <option>5 years</option>
            <option>6 years</option>
            <option>7 years</option>
            <option>8 years</option>
            <option>9 years</option>
            <option>10+ years</option>
          </select>
        </div>

        <div class="mb-3">
          <label for="home_ownership" class="form-label">Home Ownership</label>
          <select class="form-select" id="home_ownership" name="home_ownership" required>
            <option>MORTGAGE</option>
            <option>OWN</option>
            <option>RENT</option>
            <option>OTHER</option>
          </select>
        </div>

        <div class="mb-3">
          <label for="annual_inc" class="form-label">Annual Income</label>
          <input
            type="number"
            step="0.01"
            id="annual_inc"
            name="annual_inc"
            class="form-control"
            required
          />
        </div>

        <div class="mb-3">
          <label for="purpose" class="form-label">Purpose</label>
          <input
            type="text"
            id="purpose"
            name="purpose"
            class="form-control"
            placeholder="e.g. credit_card, car"
            required
          />
        </div>

        <div class="mb-3">
          <label for="addr_state" class="form-label">Address State</label>
          <input
            type="text"
            id="addr_state"
            name="addr_state"
            class="form-control"
            placeholder="e.g. CA, NY"
            required
          />
        </div>

        <div class="mb-3">
          <label for="dti" class="form-label">DTI (Debt-to-Income Ratio)</label>
          <input
            type="number"
            step="0.01"
            id="dti"
            name="dti"
            class="form-control"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary w-100">Predict</button>
      </form>

      {% if result is not none %}
      <div class="result-box mt-4">
        Predicted Probability of Default: <strong>{{ "%.4f"|format(result) }}</strong>
      </div>
      {% endif %}
    </div>
  </div>

  <!-- Bootstrap JS Bundle (Popper + Bootstrap JS) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
