<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Risk Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1a4d8c;
            --secondary-color: #e9eef6;
            --accent-color: #2ecc71;
            --text-color-dark: #2c3e50;
            --text-color-light: #fdfefe;
            --card-bg: #ffffff;
            --border-color: #ced4da;
            --shadow-color: rgba(0,0,0,0.08);
            --danger-color: #e74c3c;
            --warning-color: #f1c40f;
            --success-color: #2ecc71;
        }

        body { 
            background-color: var(--secondary-color);
            font-family: 'Poppins', sans-serif;
            color: var(--text-color-dark);
            transition: background-color 0.3s ease;
        }
        
        .card { 
            border: none; 
            box-shadow: 0 10px 30px var(--shadow-color);
            border-radius: 15px;
            background-color: var(--card-bg);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }

        .app-header {
            background-color: var(--primary-color);
            color: var(--text-color-light);
            padding: 3rem 1rem;
            text-align: center;
            border-radius: 15px 15px 0 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .nav-tabs { border-bottom: none; }
        .nav-tabs .nav-link { 
            border: none; 
            color: #7f8c8d; 
            font-weight: 500; 
            padding: 1rem 1.5rem; 
            transition: all 0.3s ease;
        }
        .nav-tabs .nav-link.active { 
            color: var(--primary-color); 
            border-bottom: 3px solid var(--primary-color); 
            background-color: var(--secondary-color);
            font-weight: 600;
        }
        
        .tab-content { 
            padding: 2rem; 
            background-color: var(--secondary-color); 
            border-radius: 0 0 15px 15px;
        }
        
        .form-label { font-weight: 600; color: var(--text-color-dark); }
        .form-control, .form-select {
            border-color: var(--border-color);
            border-radius: 8px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(26, 77, 140, 0.25);
        }
        
        .btn-primary { 
            background-color: var(--primary-color); 
            border-color: var(--primary-color); 
            transition: all 0.3s ease; 
            font-weight: 600;
            padding: 0.75rem 2rem;
            border-radius: 50px;
        }
        .btn-primary:hover { 
            background-color: #153c6e; 
            border-color: #153c6e; 
            transform: translateY(-3px); 
            box-shadow: 0 8px 15px rgba(0,0,0,0.1); 
        }

        .alert-info { background-color: #d6e9f8; color: #1a4d8c; border-color: #c0d8ed; }
        .alert-success { background-color: #d4edda; border-color: #c3e6cb; color: #155724; }
        .alert-danger { background-color: #f8d7da; border-color: #f5c6cb; color: #721c24; }
        .alert-warning { background-color: #fff3cd; border-color: #ffeeba; color: #856404; }
        
        /* --- NEW TABLE STYLING --- */
        .data-table-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-top: 1.5rem;
        }
        .data-table-card .card-body {
            padding: 0;
        }
        .data-table-card h6 {
            padding: 1.5rem 1.5rem 0;
            margin-bottom: 0;
        }
        
        .scrollable-table-wrapper {
            max-height: 400px;
            overflow-y: auto;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            min-width: 800px;
        }
        
        /* Header color fix */
        .data-table thead {
            background-color: var(--primary-color);
            color: var(--text-color-light);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        /* Ensure the header cells inherit the background color */
        .data-table thead th {
            background-color: var(--primary-color);
            color: var(--text-color-light);
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--primary-color);
            text-align: left;
            font-weight: 600;
        }
        
        .data-table td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
        }
        
        .data-table th:last-child, .data-table td:last-child {
            border-right: none;
        }
        
        /* Alternating row colors for readability */
        .data-table tbody tr:nth-of-type(odd) {
            background-color: var(--card-bg);
        }
        .data-table tbody tr:nth-of-type(even) {
            background-color: var(--secondary-color);
        }
        
        .data-table tbody tr:hover {
            background-color: rgba(26, 77, 140, 0.1);
            cursor: pointer;
        }
        
        .results-table-container { 
            max-height: 400px; 
            overflow-y: auto; 
            padding: 0; 
            border-radius: 12px; 
            border: 1px solid var(--border-color);
        }

        .results-table {
            border: none;
            border-radius: 0;
        }
        
        .plot-container { 
            background-color: var(--card-bg);
            border: 1px solid var(--border-color); 
            border-radius: 12px; 
            padding: 1.5rem; 
            min-height: 300px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.3s ease;
        }
        .plot-container:hover {
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
        }
        .plot-container img { max-width: 100%; height: auto; border-radius: 8px; }
        .plot-spinner { position: absolute; width: 3rem; height: 3rem; }

        .text-primary, .card-title { color: var(--primary-color) !important; }
        .text-secondary { color: #7f8c8d !important; }
        .text-muted { color: #aab8c4 !important; }
        .risk-text { font-weight: 700; }
        .text-high-risk { color: var(--danger-color) !important; }
        .text-moderate-risk { color: var(--warning-color) !important; }
        .text-low-risk { color: var(--success-color) !important; }
        .bg-light { background-color: var(--secondary-color) !important; }

        .table-success, .table-success td { background-color: #d4edda !important; color: #155724 !important; }
        .table-warning, .table-warning td { background-color: #fff3cd !important; color: #856404 !important; }
        .table-danger, .table-danger td { background-color: #f8d7da !important; color: #721c24 !important; }

        .form-select, .form-control {
            font-size: 0.95rem;
        }
        .lead { font-weight: 500; }
    </style>
</head>

<script>
    function showAlert(elementId, message, type) {
        const alertDiv = document.getElementById(elementId);
        alertDiv.textContent = message;
        alertDiv.className = `alert mt-4 alert-${type}`;
        alertDiv.classList.remove('d-none');
    }

    document.getElementById('single-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());

        data.int_rate = parseFloat(data.int_rate);
        data.annual_inc = parseFloat(data.annual_inc);
        data.dti = parseFloat(data.dti);

        const resultDiv = document.getElementById('single-result');
        resultDiv.innerHTML = `<div class="alert alert-info mt-4">Predicting...</div>`;

        try {
            const response = await fetch('/api/predict_single', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            if (response.ok) {
                const probability = result.predicted_probability_of_default.toFixed(4);
                
                let riskText = "Low Risk";
                let riskClass = "text-low-risk";
                if (probability > 0.8) {
                    riskText = "High Risk";
                    riskClass = "text-high-risk";
                } else if (probability > 0.6) {
                    riskText = "Moderate Risk";
                    riskClass = "text-moderate-risk";
                }
                
                resultDiv.innerHTML = `
                    <div class="card bg-light mt-4">
                        <div class="card-body text-center">
                            <h5 class="card-title text-primary">Prediction Result</h5>
                            <hr class="my-3">
                            <p class="lead mb-0">Predicted Probability of Default:</p>
                            <h1 class="display-4 fw-bold ${riskClass}">${probability}</h1>
                            <p class="mt-2 text-muted fst-italic">This applicant is classified as: <span class="risk-text ${riskClass}">${riskText}</span></p>
                        </div>
                    </div>`;
            } else {
                resultDiv.innerHTML = `<div class="alert alert-danger mt-4">Error: ${result.detail}</div>`;
            }
        } catch (error) {
            resultDiv.innerHTML = `<div class="alert alert-danger mt-4">Network Error: ${error}</div>`;
        }
    });

    document.getElementById('batch-predict-btn').addEventListener('click', async () => {
        const fileInput = document.getElementById('json-file');
        const outputDiv = document.getElementById('batch-output-json');
        outputDiv.innerHTML = '';

        if (!fileInput.files.length) {
            showAlert('batch-result', "Please upload a JSON file.", 'warning');
            return;
        }
        const file = fileInput.files[0];
        const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                const originalData = JSON.parse(e.target.result);
                showAlert('batch-result', 'Predicting batch...', 'info');
                const response = await fetch('/api/predict_batch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(originalData)
                });
                const result = await response.json();
                if (response.ok) {
                    showAlert('batch-result', `Batch Prediction Successful. See results below.`, 'success');
                    let tableHtml = `
                        <h5>Prediction Results</h5>
                        <div class="results-table-container table-responsive">
                            <table class="table table-bordered table-striped results-table">
                                <thead><tr><th>#</th>
                                    ${Object.keys(originalData[0]).map(key => `<th>${key}</th>`).join('')}
                                    <th>PD</th></tr>
                                </thead><tbody>`;
                    result.predicted_probabilities.forEach((probability, index) => {
                        let rowClass = '';
                        if (probability > 0.8) {
                            rowClass = 'table-danger';
                        } else if (probability > 0.6) {
                            rowClass = 'table-warning';
                        } else {
                            rowClass = 'table-success';
                        }
                        
                        tableHtml += `<tr class="${rowClass}"><td>${index + 1}</td>
                                ${Object.values(originalData[index]).map(value => `<td>${value}</td>`).join('')}
                                <td>${probability.toFixed(4)}</td></tr>`;
                    });
                    tableHtml += `</tbody></table></div>`;
                    outputDiv.innerHTML = tableHtml;
                } else {
                    showAlert('batch-result', `Error: ${result.detail}`, 'danger');
                }
            } catch (error) {
                showAlert('batch-result', `Error processing file or network error: ${error}`, 'danger');
            }
        };
        reader.readAsText(file);
    });

    const edaTab = document.getElementById('eda-tab');
    let isEdaLoaded = false;
    let numericFeatures = [];
    let categoricalFeatures = [];

    edaTab.addEventListener('shown.bs.tab', async () => {
        if (isEdaLoaded) return;
        const edaContentDiv = document.getElementById('eda-content');
        
        try {
            const [featuresResponse, overviewResponse] = await Promise.all([
                fetch('/api/eda/features'),
                fetch('/api/eda/overview'),
            ]);
            
            if (!featuresResponse.ok || !overviewResponse.ok) {
                const errorDetail = featuresResponse.ok ? (await overviewResponse.json()).detail : (await featuresResponse.json()).detail;
                throw new Error(errorDetail || 'Failed to load initial EDA data.');
            }

            const featuresData = await featuresResponse.json();
            const overviewData = await overviewResponse.json();
            
            numericFeatures = featuresData.numerical;
            categoricalFeatures = featuresData.categorical;

            buildEdaStructure(edaContentDiv);
            populateDropdowns(featuresData);
            displayOverviewData(overviewData);
            addEventListenersToDropdowns();

            isEdaLoaded = true;
        } catch (error) {
            edaContentDiv.innerHTML = `<div class="alert alert-danger">Error loading EDA dashboard: ${error.message}</div>`;
        }
    });

    function buildEdaStructure(container) {
        container.innerHTML = `
            <div class="row">
                <div class="col-lg-6 mb-4">
                    <div class="card h-100">
                        <div class="card-header"><h5>Univariate Analysis (Single Feature)</h5></div>
                        <div class="card-body">
                            <p class="card-text small text-muted">See the distribution of a single feature.</p>
                            <select id="univariate-select" class="form-select mb-3"><option selected>Select a feature...</option></select>
                            <div id="univariate-plot-container" class="plot-container">
                                <div id="univariate-spinner" class="plot-spinner spinner-border text-primary" role="status" style="display: none;"></div>
                                <img id="univariate-plot-img" src="" alt="">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6 mb-4">
                    <div class="card h-100">
                        <div class="card-header"><h5>Bivariate Analysis (vs. Loan Status)</h5></div>
                        <div class="card-body">
                            <p class="card-text small text-muted">Analyze how a feature relates to the loan outcome.</p>
                            <select id="bivariate-select" class="form-select mb-3"><option selected>Select a feature...</option></select>
                            <div id="bivariate-plot-container" class="plot-container">
                                <div id="bivariate-spinner" class="plot-spinner spinner-border text-primary" role="status" style="display: none;"></div>
                                <img id="bivariate-plot-img" src="" alt="">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="card data-table-card mt-4">
                <div class="card-body">
                    <h6>Summary Statistics (Numerical)</h6>
                    <div id="summary-stats-container" class="scrollable-table-wrapper"></div>
                </div>
            </div>
            
            <div class="card data-table-card mt-4">
                <div class="card-body">
                    <h6>Features with Missing Values</h6>
                    <div id="missing-values-container" class="scrollable-table-wrapper"></div>
                </div>
            </div>
            <div class="card data-table-card mt-4">
                <div class="card-body">
                    <h6>Correlation Matrix (Numerical Features)</h6>
                    <div id="correlation-matrix-container" class="scrollable-table-wrapper"></div>
                </div>
            </div>`;
    }

    function populateDropdowns(features) {
        const uniSelect = document.getElementById('univariate-select');
        const biSelect = document.getElementById('bivariate-select');
        const allFeatures = [...features.numerical, ...features.categorical].sort();
        
        allFeatures.forEach(feature => {
            uniSelect.innerHTML += `<option value="${feature}">${feature}</option>`;
            biSelect.innerHTML += `<option value="${feature}">${feature}</option>`;
        });
    }

    function displayOverviewData(overview) {
        document.getElementById('summary-stats-container').innerHTML = generateSummaryStatsTable(overview.summary_statistics);
        document.getElementById('missing-values-container').innerHTML = generateMissingValuesTable(overview.missing_values);
        document.getElementById('correlation-matrix-container').innerHTML = generateCorrelationMatrixTable(overview.correlation_matrix);
    }

    // function displaymetricsdata(data) {
    //     document.getElementById("model-metrics").innerHTML = generateModelMetricsTable(data);
    // }
    
    function addEventListenersToDropdowns() {
        document.getElementById('univariate-select').addEventListener('change', (e) => updatePlot('univariate', e.target.value));
        document.getElementById('bivariate-select').addEventListener('change', (e) => updatePlot('bivariate', e.target.value));
    }

    async function updatePlot(plotType, featureName) {
        if (!featureName || featureName === "Select a feature...") return;

        const imgElement = document.getElementById(`${plotType}-plot-img`);
        const spinner = document.getElementById(`${plotType}-spinner`);

        imgElement.src = "";
        imgElement.alt = "";
        spinner.style.display = 'block';

        try {
            const response = await fetch(`/api/eda/${plotType}_plot?feature_name=${encodeURIComponent(featureName)}`);
            const data = await response.json();
            if (response.ok) {
                imgElement.src = 'data:image/png;base64,' + data.plot;
                imgElement.alt = `${featureName} ${plotType} plot`;
            } else {
                throw new Error(data.detail || 'Failed to generate plot.');
            }
        } catch (error) {
            console.error(`Error fetching ${plotType} plot:`, error);
            const plotContainer = document.getElementById(`${plotType}-plot-container`);
            plotContainer.innerHTML += `<small class="text-danger">Error: ${error.message}</small>`;
        } finally {
            spinner.style.display = 'none';
        }
    }

    function generateSummaryStatsTable(data) {
        const features = Object.keys(data);
        if (features.length === 0) return '<p>No numerical data to display.</p>';
        
        const metrics = Object.keys(data[features[0]]);
        
        let table = '<table class="data-table">';
        table += '<thead><tr><th>Feature</th>';
        metrics.forEach(m => table += `<th>${m}</th>`);
        table += '</tr></thead><tbody>';
        
        features.forEach(feature => {
            table += `<tr><td><strong>${feature}</strong></td>`;
            metrics.forEach(metric => {
                const value = data[feature][metric];
                const displayValue = (value !== null) ? parseFloat(value).toFixed(2) : 'N/A';
                table += `<td>${displayValue}</td>`;
            });
            table += '</tr>';
        });
        
        table += '</tbody></table>';
        return table;
    }

    function generateMissingValuesTable(data) {
        if (Object.keys(data).length === 0) return '<p>No missing values found.</p>';
        
        let table = '<table class="data-table">';
        table += '<thead><tr><th>Feature</th><th>Missing Count</th></tr></thead><tbody>';
        for (const [feature, count] of Object.entries(data)) {
            table += `<tr><td>${feature}</td><td>${count}</td></tr>`;
        }
        table += '</tbody></table>';
        return table;
    }

    function generateCorrelationMatrixTable(data) {
        if (!data || Object.keys(data).length === 0) {
            return '<p>No correlations found.</p>';
        }
        
        let cols = Object.keys(data);
        let table = '<table class="data-table">';
        
        // header row
        table += '<thead><tr><th>Feature</th>';
        for (const col of cols) {
            table += `<th>${col}</th>`;
        }
        table += '</tr></thead><tbody>';
        
        // body rows
        for (const row of cols) {
            table += `<tr><td>${row}</td>`;
            for (const col of cols) {
                let val = data[row]?.[col];  // safe access
                table += `<td>${val !== undefined && val !== null ? val.toFixed(2) : ''}</td>`;
            }
            table += '</tr>';
        }
        
        table += '</tbody></table>';
        return table;
    }
